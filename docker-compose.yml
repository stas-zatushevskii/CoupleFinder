version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: couplefinder-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: couplefinder
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d couplefinder"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: couplefinder-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      HTTP_ADDR: ":8080"
      POSTGRES_DSN: "postgres://postgres:postgres@postgres:5432/couplefinder?sslmode=disable"
    ports:
      - "8080:8080"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: couplefinder-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "3000:80"

volumes:
  postgres_data: